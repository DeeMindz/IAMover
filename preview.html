<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bot Preview — IAM Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-base: #0a0a0f;
      --bg-glass: rgba(18, 18, 32, 0.7);
      --bg-elevated: #16162a;
      --text-primary: #ffffff;
      --text-secondary: #9494b8;
      --accent: #6c63ff;
      --accent-glow: rgba(108, 99, 255, 0.3);
      --border: rgba(255, 255, 255, 0.08);
      --radius-xl: 24px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --font-display: 'Outfit', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-base);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    /* Glass Container */
    #preview-container {
      width: 100%;
      height: 100%;
      max-width: 440px;
      max-height: 720px;
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      display: flex;
      flex-direction: column;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
      position: relative;
      overflow: hidden;
      animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideIn {
      from {
        transform: translateY(20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    header {
      padding: 24px;
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .bot-avatar {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), #8b85ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #fff;
      font-family: var(--font-display);
      box-shadow: 0 8px 16px var(--accent-glow);
    }

    .bot-details h1 {
      font-size: 17px;
      font-weight: 700;
      font-family: var(--font-display);
      letter-spacing: -0.02em;
    }

    .bot-details p {
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .bot-status-dot {
      width: 6px;
      height: 6px;
      background: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 10px #10b981;
    }

    #chat-area {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
    }

    .message {
      max-width: 80%;
      padding: 14px 18px;
      font-size: 14.5px;
      line-height: 1.6;
      position: relative;
      animation: messageIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes messageIn {
      from {
        transform: scale(0.95) translateY(10px);
        opacity: 0;
      }

      to {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    .message.bot {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      border-radius: 18px 18px 18px 4px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .message.user {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
      border-radius: 18px 18px 4px 18px;
      box-shadow: 0 10px 20px var(--accent-glow);
    }

    footer {
      padding: 20px 24px 30px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .input-wrapper {
      flex: 1;
      position: relative;
    }

    input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 18px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: all 0.2s ease;
    }

    input:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    #send-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 16px;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 8px 16px var(--accent-glow);
    }

    #send-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
    }

    #send-btn:active {
      transform: translateY(0) scale(0.95);
    }

    .typing {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 14px;
      width: fit-content;
      margin-bottom: 10px;
    }

    .dot {
      width: 5px;
      height: 5px;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: scale(0.6);
        opacity: 0.4;
      }

      40% {
        transform: scale(1.1);
        opacity: 1;
      }
    }

    /* Widget Mode */
    body.widget-mode {
      background: transparent;
      justify-content: flex-end;
      align-items: flex-end;
      padding: 30px;
    }
    .widget-mode #preview-container {
      width: 400px;
      height: 600px;
      position: fixed;
      bottom: 100px;
      right: 30px;
      display: none;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    #widget-launcher {
      width: 60px;
      height: 60px;
      background: var(--accent);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 16px var(--accent-glow);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 100;
    }
    #widget-launcher:hover { transform: scale(1.1); }
    #proactive-bubble {
      position: fixed;
      bottom: 105px;
      right: 30px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      padding: 12px 18px;
      border-radius: 18px 18px 4px 18px;
      font-size: 14px;
      max-width: 240px;
      display: none;
      animation: bubblePop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      z-index: 90;
    }
    @keyframes bubblePop {
      from { transform: scale(0.8) translateY(10px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }
    .widget-mode #widget-launcher { display: flex; }
    .widget-mode.open #preview-container { display: flex; animation: widgetOpen 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .widget-mode.open #proactive-bubble { display: none !important; }
    @keyframes widgetOpen {
      from { transform: scale(0.95) translateY(20px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }
    #close-widget {
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    #close-widget:hover { opacity: 1; }
  </style>
</head>

<body>
  <div id="proactive-bubble">Hello! Have any questions? 👋</div>

  <div id="widget-launcher" onclick="toggleWidget()">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
      stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
    </svg>
  </div>

  <div id="preview-container">
    <header>
      <div id="bot-avatar" class="bot-avatar">?</div>
      <div class="bot-details" style="flex:1;">
        <h1 id="bot-name">Loading Bot...</h1>
        <p id="bot-status"><span class="bot-status-dot"></span> Online</p>
      </div>
      <div id="close-widget" onclick="toggleWidget()" style="display:none;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </div>
    </header>
    <div id="chat-area"></div>
    <footer>
      <div class="input-wrapper">
        <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
      </div>
      <button id="send-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </footer>
  </div>

  <script type="module">
    import { supabase } from './js/supabase.js';

    const urlParams = new URLSearchParams(window.location.search);
    const botId = urlParams.get('botId');
    const mode = urlParams.get('mode') || 'embed';

    const nameEl = document.getElementById('bot-name');
    const avatarEl = document.getElementById('bot-avatar');
    const chatArea = document.getElementById('chat-area');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const bubble = document.getElementById('proactive-bubble');

    if (mode === 'widget') {
      document.body.classList.add('widget-mode');
      document.getElementById('close-widget').style.display = 'block';

      // Show proactive bubble after 1.5s
      setTimeout(() => {
        if (!document.body.classList.contains('open')) {
          bubble.style.display = 'block';
        }
      }, 1500);

      bubble.onclick = () => { toggleWidget(); };
    }

    window.toggleWidget = function () {
      document.body.classList.toggle('open');
    }

    async function init() {
      if (!botId) {
        nameEl.textContent = 'Invalid Bot';
        return;
      }

      const { data: bot, error } = await supabase.from('bots').select('*').eq('id', botId).single();
      if (error || !bot) {
        nameEl.textContent = 'Bot not found';
        return;
      }

      nameEl.textContent = bot.name;
      avatarEl.textContent = bot.name.charAt(0).toUpperCase();
      avatarEl.style.background = bot.color || '#6c63ff';

      if (bot.greeting_message) {
        bubble.textContent = bot.greeting_message;
        chatArea.innerHTML = `<div class="message bot">${bot.greeting_message}</div>`;
      }
    }

    function addMessage(text, role) {
      const msg = document.createElement('div');
      msg.className = `message ${role}`;
      msg.textContent = text;
      chatArea.appendChild(msg);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    // Get system variables for bot context
    function getSystemVars() {
      return {
        current_timestamp: Date.now(),
        page_url: window.location.href,
        browser_language: navigator.language || 'en',
        page_title: document.title,
        user_timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        user_platform: navigator.platform,
        user_origin: document.referrer || 'direct'
      };
    }

    // Replace {{variable}} placeholders in bot response
    function replaceSystemVars(text) {
      const vars = getSystemVars();
      let result = text;
      for (const [key, value] of Object.entries(vars)) {
        result = result.replace(new RegExp(`{{${key}}}`, 'g'), value);
      }
      return result;
    }

    // Call backend API to get bot response
    async function getBotResponse(message, botId, systemVars) {
      try {
        const response = await fetch('/api/bot/respond', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            // Add auth header if needed: 'Authorization': 'Bearer YOUR_TOKEN'
          },
          body: JSON.stringify({
            message: message,
            bot_id: botId,
            system_vars: systemVars
          })
        });

        if (!response.ok) throw new Error('API request failed');
        const data = await response.json();
        return data.response || data.message || data.text;
      } catch (e) {
        console.error('Bot API error:', e);
        return null; // Will fall back to preview response
      }
    }

    async function handleSend() {
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      addMessage(text, 'user');

      // Get system variables
      const systemVars = getSystemVars();
      console.log('System vars sent with message:', systemVars);

      const typing = document.createElement('div');
      typing.className = 'message bot typing';
      typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
      chatArea.appendChild(typing);
      chatArea.scrollTop = chatArea.scrollHeight;

      // Try to get real response from API
      let botResponse = null;
      if (botId) {
        botResponse = await getBotResponse(text, botId, systemVars);
      }

      // Remove typing indicator
      typing.remove();

      // Use API response or fall back to preview message
      if (botResponse) {
        // Replace system variables in response
        const processedResponse = replaceSystemVars(botResponse);
        addMessage(processedResponse, 'bot');
      } else {
        // Fallback for preview (when no API configured)
        const previewResponse = "I'm a preview bot. Configure your API endpoint in preview.html to enable real AI responses. For now, I'm using dummy responses based on your knowledge base.";
        addMessage(previewResponse, 'bot');
      }
    }

    sendBtn.onclick = handleSend;
    input.onkeypress = (e) => { if (e.key === 'Enter') handleSend(); };

    init();
  </script>
</body>

</html>
